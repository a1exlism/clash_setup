# ==============================
# Clash Verge Static Override
# ==============================

profile:
  store-selected: true

rules:
  # =========================================
  # 1. PROCESS RULES（进程级分流）
  # =========================================
  # 用于“整个应用”强制走某个策略

  # ---- Tmp：临时出口 ----
  - PROCESS-NAME,HillsLite.exe,HK
  - PROCESS-NAME,HillsPlayer.exe,HK

  # ---- Proxies ----
  - PROCESS-NAME,cursor.exe,US

  # ---- SecUS🟩：风控隔离出口 ----
  - PROCESS-NAME,brave.exe,SecUS🟩

  # ---- DIRECT：本地软件 ----
  - PROCESS-NAME,Weixin.exe,DIRECT
  - PROCESS-NAME,WeChatAppEx.exe,DIRECT
  - PROCESS-NAME,WXWork.exe,DIRECT
  - PROCESS-NAME,GameViewerServer.exe,DIRECT

  # =========================================
  # 2. TMP RULES（临时分流）
  # =========================================
  # 用于测试 / 灰度 / 特定业务隔离

  # ---- 域名后缀 ----
  - DOMAIN-SUFFIX,example.com,Tmp
  - DOMAIN-SUFFIX,example.net,Tmp

  # ---- 关键词 ----
  - DOMAIN-KEYWORD,test-env,Tmp
  - DOMAIN-KEYWORD,staging,Tmp

  # ---- 精确域名 ----
  - DOMAIN,api.example.com,Tmp
  - DOMAIN,download.example.com,Tmp

  # ---- IP ----
  - IP-CIDR,203.0.113.0/24,Tmp,no-resolve
  - IP-CIDR,198.51.100.10/32,Tmp,no-resolve

  # =========================================
  # 3. SECUS RULES（强约束流量）
  # =========================================
  # 用于 AI / 风控 / 指纹敏感业务

  # ---- 自定义业务 ----
  - DOMAIN,secure.example.com,SecUS🟩

  # =========================================
  # 4. ADVANCED RULES（可选）
  # =========================================
  # 允许直接接入内部组，但不建议作为默认写法

  # ---- 直接接入 Proxies ----
  # - DOMAIN-SUFFIX,advanced-proxy.example,Proxies

  # ---- 宽匹配规则（按需启用）----
  # 建议仅在你明确接受宽匹配副作用时启用
  - DOMAIN-SUFFIX,ai,US
  - DOMAIN-KEYWORD,cursor,US
  - DOMAIN-SUFFIX,io,Final
  - DOMAIN-SUFFIX,work,Final
  - DOMAIN-SUFFIX,steampowered.com,Final
  - DOMAIN-SUFFIX,bilibili.com,DIRECT
  
  # ---- 本地软件 ----
  - PROCESS-NAME,telegram.exe,Final

  # ---- 直接接入 Final ----
  # - DOMAIN-SUFFIX,advanced-final.example,Final

  # =========================================
  # 5. DIRECT RULES（本地 / 内网）
  # =========================================

  # ---- 本地域名 ----
  - DOMAIN-SUFFIX,lan,DIRECT
  - DOMAIN-SUFFIX,local,DIRECT

  # ---- 内网网段 ----
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve

  # ---- 特定局域网设备 ----
  - IP-CIDR,192.168.31.76/32,DIRECT,no-resolve
  - IP-CIDR,192.168.1.19/32,DIRECT,no-resolve
